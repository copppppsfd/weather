name: Post Himawari Image

on:
  schedule:
    # Runs every 10 minutes (GitHub may delay this a few minutes under load)
    - cron: '*/10 * * * *'
  workflow_dispatch: {}   # adds a manual "Run workflow" button in the Actions tab

permissions:
  contents: write   # needed so the job can commit the updated state file

jobs:
  post:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests

      - name: Check for a new image and post it
        env:
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
          HIMAWARI_SECTOR: r2w
          HIMAWARI_BAND: hrp
          HIMAWARI_URL_TEMPLATE: https://www.data.jma.go.jp/mscweb/en/product/data/fs/aswind_fsir_{HHMM}.png
        run: python post_himawari.py
        

      - name: Commit updated state (if changed)
        run: |
          git config user.name "himawari-bot"
          git config user.email "actions@github.com"
          git add last_slot.txt
          git diff --staged --quiet || git commit -m "Update last posted slot"
          git push
