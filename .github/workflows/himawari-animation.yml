name: Post Himawari Animation
on:
  schedule:
    # Every 10 menit. Each run covers a ~2 hour window of frames (see
    # ANIMATION_FRAME_COUNT below), so runs overlap slightly rather than
    # leaving gaps.
    - cron: '*/10 * * * *'
  workflow_dispatch: {}   # manual "Run workflow" button in the Actions tab
jobs:
  post:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install dependencies
        run: pip install requests pillow
      - name: Install ffmpeg
        run: sudo apt-get update && sudo apt-get install -y ffmpeg
      - name: Build and post animation
        env:
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
          HIMAWARI_URL_TEMPLATE: https://www.data.jma.go.jp/mscweb/data/himawari/img/r2w/r2w_snd_{HHMM}.jpg
        run: python post_himawari_animation.py
      - name: Build and post animation 2
        env:
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
          HIMAWARI_URL_TEMPLATE: https://www.data.jma.go.jp/mscweb/en/product/data/fs/aswind_fsir_{HHMM}.png
          # ASWind full-disk imagery refreshes every ~30 min, so the step
          # is set to match -- otherwise most 10-min slots would just
          # re-fetch the same still-current frame. 16 frames * 30 min = 8
          # hours covered.
          ANIMATION_STEP_MINUTES: '30'
          ANIMATION_FRAME_COUNT: '16'
        run: python post_himawari_animation.py

      - name: Build and post animation 3
        env:
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
          HIMAWARI_URL_TEMPLATE: https://www.data.jma.go.jp/mscweb/en/product/data/fn/aswind_fnir_{HHMM}.png
          # Target-area ASWind imagery refreshes every ~10 min (the
          # default step), so just extending frame count covers more time:
          # 24 frames * 10 min = 4 hours.
          ANIMATION_FRAME_COUNT: '24'
        run: python post_himawari_animation.py
